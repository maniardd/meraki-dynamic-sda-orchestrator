policy_version: "1.0"

fabric_control_plane:
  default_mode: classic_lisp
  allowed_modes: [classic_lisp, lisp_bgp_transit, lisp_pubsub]

deployment_models: [single_site, distributed_campus]

hierarchy:
  max_depth: 16

# CVD planning guidelines, not device or Catalyst Center maximum scale claims.
# Exact release/platform limits remain a separate compatibility gate.
site_profiles:
  - id: fabric_in_a_box
    max_endpoints: 999
    max_aps: 49
  - id: small_site
    max_endpoints: 9999
    max_aps: 499
  - id: medium_site
    max_endpoints: 49999
    max_aps: 2499
  - id: large_site
    max_endpoints: 100000
    max_aps: 10000

supernets:
  underlay_p2p:
    cidr: 10.252.0.0/16
    prefix_len: 31
  loopbacks:
    cidr: 10.253.0.0/16
    prefix_len: 32
  overlay_hosts:
    cidr: 10.0.0.0/9
  border_handoff:
    cidr: 172.31.0.0/16
    prefix_len: 31
  multicast_rp:
    cidr: 10.254.0.0/24
    prefix_len: 32
  shared_service_handoff:
    cidr: 172.30.0.0/24
    prefix_len: 30

ranges:
  vlan_id: {min: 100, max: 3900}
  l2_instance_id: {base: 8000, max: 16777215}
  l3_instance_id: {min: 4099, max: 4999}
  bgp_asn_local: {min: 65001, max: 65100}
  rd_asn: 65000
  handoff_vlan_id: {min: 3000, max: 3900}
  sgt: {min: 2, max: 65519}
  shared_service_vlan_id: {min: 3901, max: 3999}
  lisp_domain_id: {min: 1, max: 4294967295}
  lisp_multihoming_id: {min: 1, max: 65535}

fusion:
  require_full_mesh_production: true
  min_fusion_nodes_per_border_vrf_production: 2

platform_matrix:
  - model: C9500-48Y4C
    min_ios_xe: "17.12"
    roles: [border, control_plane, fusion, underlay]
  - model: C9300-24P
    min_ios_xe: "17.12"
    roles: [fabric_edge, underlay]
  - model: C9300X-48HX
    min_ios_xe: "17.12"
    roles: [fabric_edge, underlay]

redundancy:
  min_borders_production: 2
  min_control_planes_production: 2
  min_uplinks_per_edge_production: 2
  min_fusion_nodes_production: 2

approval:
  require_roles: [approver]
  apply_requires:
    - dry_run_passed
    - capacity_ok
    - no_overlap
    - plan_hash_approved
    - artifact_hash_approved
