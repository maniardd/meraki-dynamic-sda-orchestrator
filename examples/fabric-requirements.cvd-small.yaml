schema_version: "1.1"
allocation_domain: example-cvd-small
deployment_model: single_site

metadata:
  name: Example CVD-aligned small fabric
  environment: lab
  organization: EXAMPLE-ORGANIZATION
  region: EXAMPLE-REGION
  change_reference: CHG-EXAMPLE-CVD

site_hierarchy:
  - {id: GLOBAL, name: Global, type: global}
  - {id: AREA-SJC, name: San Jose, type: area, parent_id: GLOBAL}
  - {id: BUILDING-23, name: Building 23, type: building, parent_id: AREA-SJC}
  - {id: FLOOR-1, name: Floor 1, type: floor, parent_id: BUILDING-23}

fabric_sites:
  - id: SITE-001
    name: SJC23 Fabric Site
    hierarchy_node_id: AREA-SJC
    endpoint_count: 700
    ap_count: 20
    site_local_services: false
    high_availability: false
    profile: small_site

fabric_zones:
  - id: ZONE-FLOOR-1
    fabric_site_id: SITE-001
    hierarchy_node_id: FLOOR-1
    virtual_networks: [Corporate, Guest]

fabric:
  id: fab-example-cvd-small-001
  name: EXAMPLE-CVD-SMALL-FABRIC
  mtu: 9100
  control_plane_mode: classic_lisp
  lisp_auth_key_ref: secret://example/lisp/fab-example-cvd-small-001

devices:
  - id: border-cp-01
    hostname: BORDER-CP-01
    site: SITE-001
    platform: C9500-48Y4C
    software_version: 17.12.4
    management_ip: 192.0.2.10
    dashboard_management_ip: 198.51.100.10
    roles: [border, control_plane]
    credential_ref: secret://example/devices/border-cp-01
  - id: edge-01
    hostname: EDGE-01
    site: SITE-001
    platform: C9300-24P
    software_version: 17.12.4
    management_ip: 192.0.2.20
    dashboard_management_ip: 198.51.100.20
    roles: [fabric_edge]
    credential_ref: secret://example/devices/edge-01

links:
  - id: border-cp-01--edge-01
    endpoints:
      - {device_id: border-cp-01, interface: TwentyFiveGigE1/0/1}
      - {device_id: edge-01, interface: GigabitEthernet1/0/1}
    pim_sparse_mode: true
    bfd: {enabled: true, interval_ms: 300, min_rx_ms: 300, multiplier: 3}

virtual_networks:
  - name: Corporate
    vrf: CORP_VN
    sites:
      - site: SITE-001
        users: 500
        headroom_percent: 25
        dhcp_helpers: [203.0.113.10, 203.0.113.11]
  - name: Guest
    vrf: GUEST_VN
    sites:
      - site: SITE-001
        users: 200
        headroom_percent: 50
        dhcp_helpers: [203.0.113.10, 203.0.113.11]

border_handoff:
  enabled: false
  mode: isolated
