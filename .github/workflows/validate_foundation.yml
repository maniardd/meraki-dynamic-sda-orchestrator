name: Validate Production Foundation

permissions:
  contents: read

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      POSTGRES_TEST_DSN: postgresql://sda_test:sda_test@127.0.0.1:5432/sda_test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: sda_test
          POSTGRES_PASSWORD: sda_test
          POSTGRES_DB: sda_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sda_test -d sda_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validation dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Audit Python dependencies
        run: |
          python -m pip install --disable-pip-version-check pip-audit==2.10.1
          python -m pip_audit -r requirements.txt --progress-spinner off

      - name: Compile production foundation
        run: python -m compileall -q orchestrator tools tests

      - name: Validate runtime shell scripts
        run: bash -n admin/*.sh

      - name: Validate schema and example
        run: |
          python -m json.tool schemas/fabric-intent.schema.json >/dev/null
          python -m json.tool schemas/fabric-requirements.schema.json >/dev/null
          python tools/validate_intent.py examples/fabric-intent.lab.yaml
          python tools/validate_intent.py examples/fabric-intent.production.yaml
          python tools/validate_meraki_workflow_package.py --compile --matrix >/dev/null

      - name: Run unit tests
        run: python -m unittest discover -s tests -v
