policy_version: "1.0-sjc23-golden"

fabric_control_plane:
  default_mode: classic_lisp
  allowed_modes: [classic_lisp, lisp_bgp_transit, lisp_pubsub]

# Golden acceptance profile for the known SJC23 lab. Reserved space models
# brownfield allocations and makes regeneration deterministic without placing
# addresses in the user's requirements document.
supernets:
  underlay_p2p:
    cidr: 10.255.0.0/31
    prefix_len: 31
  loopbacks:
    cidr: 10.255.255.0/30
    prefix_len: 32
    reserved: [10.255.255.0/32]
  overlay_hosts:
    cidr: 10.30.0.0/16
    reserved:
      - 10.30.0.0/18
      - 10.30.64.0/19
      - 10.30.96.0/22
      - 10.30.101.0/24
      - 10.30.102.0/23
      - 10.30.104.0/21
      - 10.30.112.0/20
      - 10.30.128.0/18
      - 10.30.192.0/21
  border_handoff:
    cidr: 172.31.0.0/16
    prefix_len: 31

ranges:
  vlan_id:
    min: 100
    max: 3900
    reserved_ranges: [[101, 199]]
  l2_instance_id: {base: 8000, max: 16777215}
  l3_instance_id: {min: 4099, max: 4999}
  bgp_asn_local: {min: 65001, max: 65100}
  rd_asn: 65000
  handoff_vlan_id: {min: 3000, max: 3900}
  lisp_domain_id: {min: 1, max: 4294967295}
  lisp_multihoming_id: {min: 1, max: 65535}

platform_matrix:
  - model: C9500-48Y4C
    min_ios_xe: "17.12"
    roles: [border, control_plane, underlay]
  - model: C9300-24P
    min_ios_xe: "17.12"
    roles: [fabric_edge, underlay]

redundancy:
  min_borders_production: 2
  min_control_planes_production: 2
  min_uplinks_per_edge_production: 2

approval:
  require_roles: [approver]
  apply_requires:
    - dry_run_passed
    - capacity_ok
    - no_overlap
    - plan_hash_approved
    - artifact_hash_approved
