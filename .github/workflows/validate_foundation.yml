name: Validate Production Foundation

permissions:
  contents: read

on:
  pull_request:
  push:
    branches:
      - "codex/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validation dependencies
        run: >-
          python -m pip install --disable-pip-version-check
          PyYAML==6.0 Flask==2.3.3 requests==2.31.0 python-dotenv==1.0.0
          jsonschema==4.17.3

      - name: Compile production foundation
        run: |
          python -m py_compile \
            orchestrator/__init__.py \
            orchestrator/intent.py \
            orchestrator/adapters.py \
            orchestrator/gates.py \
            orchestrator/parsers.py \
            orchestrator/planner.py \
            orchestrator/renderer.py \
            orchestrator/simulator.py \
            orchestrator/store.py \
            orchestrator/worker.py \
            orchestrator/workflow_audit.py \
            orchestrator/api.py \
            tools/validate_intent.py \
            tools/meraki_discover.py \
            tools/audit_workflow_export.py

      - name: Validate schema and example
        run: |
          python -m json.tool schemas/fabric-intent.schema.json >/dev/null
          python tools/validate_intent.py examples/fabric-intent.lab.yaml
          python tools/validate_intent.py examples/fabric-intent.production.yaml

      - name: Run unit tests
        run: python -m unittest discover -s tests -v
