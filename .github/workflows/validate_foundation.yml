name: Validate Production Foundation

permissions:
  contents: read

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validation dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Compile production foundation
        run: python -m compileall -q orchestrator tools tests

      - name: Validate schema and example
        run: |
          python -m json.tool schemas/fabric-intent.schema.json >/dev/null
          python -m json.tool schemas/fabric-requirements.schema.json >/dev/null
          python tools/validate_intent.py examples/fabric-intent.lab.yaml
          python tools/validate_intent.py examples/fabric-intent.production.yaml

      - name: Run unit tests
        run: python -m unittest discover -s tests -v
