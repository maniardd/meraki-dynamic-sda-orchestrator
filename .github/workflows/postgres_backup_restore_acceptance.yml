name: SDA PostgreSQL Backup Restore Acceptance

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backup-restore:
    runs-on: [self-hosted, sda-relay]
    timeout-minutes: 10

    steps:
      - name: Create private PostgreSQL backup
        id: backup
        shell: bash
        run: |
          set -euo pipefail
          backup_path="$(
            /home/sdaadmin/sda-orchestrator/current/admin/backup_postgresql.sh
          )"
          printf '%s' "${backup_path}" |
            grep -Eq '^/home/sdaadmin/[.]local/share/sda-orchestrator/backups/sda_orchestrator_[0-9]{8}T[0-9]{6}Z[.]dump$'
          printf 'backup_path=%s\n' "${backup_path}" >>"${GITHUB_OUTPUT}"

      - name: Verify restore in disposable database
        shell: bash
        run: |
          set -euo pipefail
          /home/sdaadmin/sda-orchestrator/current/admin/verify_postgresql_restore.sh \
            "${{ steps.backup.outputs.backup_path }}"
