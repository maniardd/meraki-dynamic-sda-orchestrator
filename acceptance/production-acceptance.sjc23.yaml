  apply_workflow_present: false
  device_writes_permitted: false

required_signoff_roles:
  - network_design_authority
  - automation_owner
  - security_owner
  - platform_owner
  - change_approver

gates:
  - id: software.complete_suite
    category: software
    required: true
    status: passed
    owner_roles: [automation_owner]
    dependencies: []
    evidence:
      - id: software.full-suite.20260723
        kind: test_report
        ref: evidence://acceptance/evidence/software-suite-20260723.json
        sha256: ba4b66c7fd5f1c9d32cfc09e3d4a1838b806cf421f87742c53d23e2e8452ab05
        captured_at: "2026-07-23T16:12:24Z"
        result: passed

  - id: meraki.child_path
    category: meraki
    required: true
    status: passed
    owner_roles: [automation_owner]
    dependencies: []
    evidence:
      - id: meraki.child-dry-run.20260723
        kind: meraki_run
        ref: evidence://acceptance/evidence/meraki-child-dry-run-20260723.json
        sha256: 09324f02b9bbc5f74fb5e2230d9686e2c41fc88cd9576bded82ecaac0d0be1cf
        captured_at: "2026-07-23T15:20:00Z"
        result: passed

  - id: meraki.integrated_parent
    category: meraki
    required: true
    status: passed
    owner_roles: [automation_owner, change_approver]
    dependencies: [meraki.child_path]
    evidence:
      - id: meraki.parent-accepted.20260724
        kind: meraki_run
        ref: evidence://acceptance/evidence/meraki-parent-accepted-20260724.json
        sha256: 85b8246c344a97d669a9bbf640e70db2add85d4b9eb39946048916466fee7a16
        captured_at: "2026-07-24T04:21:43Z"
        result: passed
    rationale: The corrected native parent completed plan, human approval, dry run, and evidence export successfully; the task displayed the UTC expiry on the correct localized calendar date and Apply remained absent.

  - id: meraki.native_export_import
    category: meraki
    required: true
    status: pending
    owner_roles: [automation_owner, platform_owner]
    dependencies: [meraki.integrated_parent]
    evidence: []
    rationale: Corrected parent and child exports must pass the structural auditor and duplicate-tenant import.

  - id: meraki.role_negative
    category: security
    required: true
    status: pending
    owner_roles: [security_owner, automation_owner]
    dependencies: [meraki.native_export_import]
    evidence: []
    rationale: Planner, approver, operator, and auditor authorization-denial tests remain to be captured.

  - id: ingress.stable_tls
    category: ingress
    required: true
    status: pending
    owner_roles: [platform_owner, security_owner]
    dependencies: []
    evidence: []
    rationale: Temporary ngrok ingress must be replaced by stable DNS, trusted TLS, monitoring, and controlled renewal.

  - id: runtime.postgres_backup_restore
    category: runtime
    required: true
    status: pending
    owner_roles: [platform_owner, automation_owner]
    dependencies: [software.complete_suite]
    evidence:
      - id: runtime.postgres-backup-restore.20260723
        kind: test_report
        ref: evidence://acceptance/evidence/postgres-backup-restore-20260723.json
        sha256: fe12125685861c9a610d87afacfafaa8b3754bd6b9b070896aa8648ebf8bba58
        captured_at: "2026-07-23T18:15:04Z"
        result: passed
    rationale: A private local backup and isolated disposable-cluster restore passed on the Ubuntu runner, but approved encrypted off-host retention, recovery objectives, alerting, and a second-host recovery exercise remain required.

  - id: runtime.ha_worker_recovery
    category: runtime
    required: true
    status: pending
    owner_roles: [platform_owner, automation_owner]
    dependencies: [runtime.postgres_backup_restore]
    evidence:
      - id: runtime.relay-preflight.20260723
        kind: test_report
        ref: evidence://acceptance/evidence/relay-preflight-20260723.json
        sha256: b8bde51fae099d19e3ef55f0bc4534ca6b6fdee729f56542f1aac3785383049e
        captured_at: "2026-07-23T17:24:51Z"
        result: pending
      - id: runtime.recovery-inspection.20260723
        kind: test_report
        ref: evidence://acceptance/evidence/runtime-recovery-inspection-20260723.json
        sha256: 60fe86324963d941e7513d1d013a52143b07d939a901ff33ef3b88ea238ab3d9
        captured_at: "2026-07-23T18:59:31Z"
        result: passed
    rationale: The loopback API, PostgreSQL, and read-only lock inspection are healthy with no active or expired locks, but dispatcher failover, dual-control recovery, alerting, verified interrupted-run rollback, and high-availability behavior remain unproven.

  - id: runtime.secret_rotation
    category: security
    required: true
    status: pending
    owner_roles: [security_owner, platform_owner]
    dependencies: [ingress.stable_tls]
    evidence: []
    rationale: Role-token, device-credential, certificate, and ISE-secret rotation must be proven without secret disclosure.

  - id: iosxe.read_only_precheck
    category: iosxe
    required: true
    status: pending
    owner_roles: [network_design_authority, automation_owner]
    dependencies: [software.complete_suite]
    evidence:
      - id: iosxe.relay-two-plane-preflight.20260723
        kind: test_report
        ref: evidence://acceptance/evidence/relay-preflight-20260723.json
        sha256: b8bde51fae099d19e3ef55f0bc4534ca6b6fdee729f56542f1aac3785383049e
        captured_at: "2026-07-23T17:24:51Z"
        result: pending
    rationale: Dashboard/OOB SSH is reachable for both switches, but both required execution-management SSH endpoints are unreachable; device facts cannot be re-confirmed until that path is restored.

  - id: iosxe.underlay
    category: iosxe
    required: true
    status: pending
    owner_roles: [network_design_authority, automation_owner]
    dependencies: [iosxe.read_only_precheck]
    evidence: []
    rationale: IS-IS, BFD, PIM, loopback, MTU, convergence, and rollback acceptance is required.

  - id: iosxe.lisp_vxlan
    category: iosxe
    required: true
    status: pending
    owner_roles: [network_design_authority, automation_owner]
    dependencies: [iosxe.underlay]
    evidence: []
    rationale: LISP control-plane, VXLAN data-plane, endpoint registration, reachability, and rollback acceptance is required.

  - id: fusion.bgp_handoff
    category: fusion
    required: true
    status: pending
    owner_roles: [network_design_authority, automation_owner]
    dependencies: [iosxe.lisp_vxlan]
    evidence: []
    rationale: The isolated lab has no fusion node; a representative redundant fusion topology is required for production acceptance.

  - id: multicast.native_overlay
    category: multicast
    required: true
    status: pending
    owner_roles: [network_design_authority, automation_owner]
    dependencies: [iosxe.lisp_vxlan]
    evidence: []
    rationale: ASM/SSM, BUM, RP/MSDP, traffic-flow, stale-state, and rollback evidence is required.

  - id: policy.ise_sxp_sgt
    category: policy
    required: true
    status: pending
    owner_roles: [network_design_authority, security_owner, platform_owner]
    dependencies: [iosxe.lisp_vxlan]
    evidence: []
    rationale: ISE ERS ownership, SGT/SGACL, SXP release semantics, propagation, enforcement, and rollback require acceptance.

  - id: reconciliation.owned_state
    category: reconciliation
    required: true
    status: pending
    owner_roles: [automation_owner, network_design_authority]
    dependencies: [iosxe.lisp_vxlan, multicast.native_overlay]
    evidence: []
    rationale: Approved baseline adoption, removal, mode-change, absence gates, and stale-state rollback require evidence.

  - id: telemetry.observability
    category: telemetry
    required: true
    status: pending
    owner_roles: [platform_owner, network_design_authority]
    dependencies: [runtime.ha_worker_recovery, iosxe.lisp_vxlan]
    evidence: []
    rationale: Metrics, logs, alerts, audit retention, device telemetry, and operator response procedures require acceptance.

  - id: scale.multisite
    category: scale
    required: true
    status: pending
    owner_roles: [automation_owner, network_design_authority, platform_owner]
    dependencies: [runtime.ha_worker_recovery, reconciliation.owned_state]
    evidence: []
    rationale: Multi-site planning, concurrency, idempotency, pool exhaustion, workflow runtime, and recovery objectives require evidence.

  - id: operations.pilot_change
    category: operations
    required: true
    status: pending
    owner_roles: [change_approver, network_design_authority, automation_owner]
    dependencies:
      - meraki.role_negative
      - runtime.secret_rotation
      - fusion.bgp_handoff
      - multicast.native_overlay
      - policy.ise_sxp_sgt
      - telemetry.observability
      - scale.multisite
    evidence: []
    rationale: The controlled pilot maintenance window, rollback authority, communications, and final evidence review remain pending.

signoffs:
  - role: network_design_authority
    status: pending
  - role: automation_owner
    status: pending
  - role: security_owner
    status: pending
  - role: platform_owner
    status: pending
  - role: change_approver
    status: pending
